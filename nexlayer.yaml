application:
  name: listmonk
  pods:
  - name: app
    image: mirror.gcr.io/listmonk/listmonk:latest
    path: /
    # String-form command (KB deploy contract). The platform wraps/execs it.
    command: sh -c "./listmonk --install --idempotent --yes && ./listmonk --upgrade --yes && exec ./listmonk"
    servicePorts:
    - 9000
    vars:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_db__host: listmonk-postgres-service
      LISTMONK_db__port: "5432"
      LISTMONK_db__user: listmonk
      LISTMONK_db__password: ${POSTGRES_PASSWORD}
      LISTMONK_db__database: listmonk
      LISTMONK_db__ssl_mode: disable
      LISTMONK_ADMIN_USER: admin
      LISTMONK_ADMIN_PASSWORD: listmonkadmin
      TZ: Etc/UTC
    volumes:
    - name: listmonk-uploads
      mountPath: /listmonk/uploads
      size: 5Gi
  - name: postgres
    image: mirror.gcr.io/library/postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: listmonk
      POSTGRES_USER: listmonk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
    - name: listmonk-db
      mountPath: /var/lib/postgresql/data
      size: 5Gi
