application:
  name: listmonk
  pods:
  - name: app
    image: listmonk/listmonk:latest
    path: /
    # listmonk's default image CMD is just `./listmonk`, which FATALS on an
    # empty database ("relation does not exist"). The DB schema must be created
    # with `--install` and migrated with `--upgrade` on first boot. Override the
    # command (passed to the image's docker-entrypoint.sh) to run the idempotent
    # install + upgrade, then serve. config.toml is absent in env-only mode, so
    # listmonk uses the LISTMONK_* env vars below.
    command: ["sh", "-c", "./listmonk --install --idempotent --yes && ./listmonk --upgrade --yes && exec ./listmonk"]
    servicePorts:
    - 9000
    vars:
      LISTMONK_app__address: "0.0.0.0:9000"
      # Reference listmonk's OWN postgres by its full, unique service name — NOT
      # `postgres.pod`, which collides with the dozens of other `postgres` pods
      # in this shared namespace and would point listmonk at the wrong database.
      LISTMONK_db__host: listmonk-postgres-service
      LISTMONK_db__port: "5432"
      LISTMONK_db__user: listmonk
      # Reference the SAME provisioned secret the postgres pod is initialized with
      # (the pipeline hoists POSTGRES_PASSWORD to ${POSTGRES_PASSWORD} and provisions
      # one value). Using a literal here desyncs from the regenerated DB password.
      LISTMONK_db__password: ${POSTGRES_PASSWORD}
      LISTMONK_db__database: listmonk
      LISTMONK_db__ssl_mode: disable
      # Auto-create the super-admin on first install so the UI is usable.
      LISTMONK_ADMIN_USER: admin
      LISTMONK_ADMIN_PASSWORD: listmonkadmin
      TZ: Etc/UTC
    volumes:
    - name: listmonk-uploads
      mountPath: /listmonk/uploads
      size: 5Gi
  - name: postgres
    image: postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: listmonk
      POSTGRES_USER: listmonk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # postgres:16-alpine initdb refuses a non-empty mount root; use a sub-dir.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
    - name: listmonk-db
      mountPath: /var/lib/postgresql/data
      size: 5Gi
